# =================================================================
# PIPELINE DEVSECOPS - AUTOMATION ANYWHERE
# GitHub Actions
#
# Flujo:
#   1. Dev ejecuta el pipeline manualmente
#   2. Llena nombre del bot y carpeta en AA Privada
#   3. Pipeline busca y exporta el bot desde AA via API
#   4. Analiza el bot (sintaxis, credenciales, calidad, Code Analysis)
#   5. Manda correo al lider con el reporte
#   6. Lider aprueba o rechaza en GitHub
#   7. Si aprueba -> pipeline hace check-in a Publica en AA
#
# SECRETS requeridos en GitHub (Settings -> Secrets -> Actions):
#   AA_URL            -> URL del Control Room
#   AA_USERNAME       -> usuario de servicio
#   AA_API_KEY        -> API key del usuario
#   AA_AUTH_ENDPOINT  -> /v2/authentication
#   MAIL_USERNAME     -> correo que envia (Gmail)
#   MAIL_PASSWORD     -> app password del correo
#   MAIL_TO           -> correo del lider tecnico
# =================================================================

name: AA DevSecOps Pipeline

# -----------------------------------------------------------------
# TRIGGER MANUAL: el dev ejecuta el pipeline y llena el formulario
# -----------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:
      bot_nombre:
        description: 'Nombre del bot en AA (ej: Calidad)'
        required: true
        type: string
      bot_carpeta:
        description: 'Carpeta del bot en AA Privada (ej: Bots/DevSecOps)'
        required: true
        type: string
      bot_id_manual:
        description: 'ID del bot en AA (opcional - lo ves en la URL al editar el bot)'
        required: false
        type: string
        default: 

# =================================================================
# JOB 1: BUSCAR Y EXPORTAR BOT DESDE AA PRIVADA
# =================================================================
jobs:
  exportar_bot:
    name: '1. Exportar bot desde AA Privada'
    runs-on: ubuntu-latest
    outputs:
      bot_id:               ${{ steps.buscar_bot.outputs.bot_id }}
      bot_nombre:           ${{ steps.buscar_bot.outputs.bot_nombre }}
      bot_carpeta:          ${{ steps.buscar_bot.outputs.bot_carpeta }}
      total_critical:       ${{ steps.code_analysis.outputs.total_critical }}
      total_high:           ${{ steps.code_analysis.outputs.total_high }}
      total_low:            ${{ steps.code_analysis.outputs.total_low }}
      credential_violations: ${{ steps.credential_scan.outputs.credential_violations }}

    steps:
      - name: Buscar y exportar bot desde AA
        id: buscar_bot
        env:
          AA_URL:           ${{ secrets.AA_URL }}
          AA_USERNAME:      ${{ secrets.AA_USERNAME }}
          AA_API_KEY:       ${{ secrets.AA_API_KEY }}
          AA_AUTH_ENDPOINT: ${{ secrets.AA_AUTH_ENDPOINT }}
          BOT_NOMBRE:       ${{ github.event.inputs.bot_nombre }}
          BOT_CARPETA:      ${{ github.event.inputs.bot_carpeta }}
          BOT_ID_MANUAL:    ${{ github.event.inputs.bot_id_manual }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, ssl, os, sys

          aa_url    = os.environ["AA_URL"]
          username  = os.environ["AA_USERNAME"]
          api_key   = os.environ["AA_API_KEY"]
          endpoint  = os.environ.get("AA_AUTH_ENDPOINT", "/v2/authentication")
          bot_name  = os.environ["BOT_NOMBRE"]
          bot_folder= os.environ["BOT_CARPETA"]

          ctx = ssl.create_default_context()

          # -- Login --
          payload = json.dumps({"username": username, "apiKey": api_key}).encode("utf-8")
          req = urllib.request.Request(
            aa_url + endpoint, data=payload,
            headers={"Content-Type": "application/json"}
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              token = json.loads(r.read().decode("utf-8")).get("token", "")
            if not token:
              print("ERROR: Token vacio")
              sys.exit(1)
            print(f"Login exitoso")
          except Exception as e:
            print(f"ERROR login: {e}")
            sys.exit(1)

          hdrs = {"Content-Type": "application/json", "X-Authorization": token}

          # -- Buscar bot: si viene ID manual lo usa directo, si no busca por nombre --
          bot_id_manual = os.environ.get("BOT_ID_MANUAL", "").strip()

          if bot_id_manual:
            bot_id = bot_id_manual
            print(f"[OK] Usando ID manual: {bot_id}")
          else:
            print(f"Buscando bot '{bot_name}' en AA...")
            payload = json.dumps({
              "filter": {
                "operator": "substring",
                "field": "name",
                "value": bot_name
              },
              "fields": ["id", "name", "path", "workspaceType"],
              "page": {"offset": 0, "length": 50}
            }).encode("utf-8")
            req = urllib.request.Request(
              aa_url + "/v2/repository/file/list", data=payload, headers=hdrs
            )
            bot_id = ""
            try:
              with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                items = json.loads(r.read().decode("utf-8")).get("list", [])
                print(f"Bots encontrados con nombre '{bot_name}': {len(items)}")
                for item in items:
                  print(f"  ID: {item.get('id')} | Nombre: {item.get('name')} | Path: {item.get('path')} | Workspace: {item.get('workspaceType','?')}")

                for item in items:
                  if item.get("name","").lower() == bot_name.lower() and item.get("workspaceType","") == "PRIVATE":
                    bot_id = str(item.get("id",""))
                    print(f"[OK] Bot PRIVADO encontrado: {item.get('name')} | ID: {bot_id}")
                    break
                if not bot_id:
                  for item in items:
                    if item.get("name","").lower() == bot_name.lower():
                      bot_id = str(item.get("id",""))
                      print(f"[OK] Bot encontrado: {item.get('name')} | ID: {bot_id}")
                      break
            except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8")
              print(f"ERROR HTTP {e.code}: {body[:300]}")
              sys.exit(1)
            except Exception as e:
              print(f"ERROR buscando bot: {e}")
              sys.exit(1)

            if not bot_id:
              print(f"ERROR: Bot '{bot_name}' no encontrado")
              print(f"  Tip: Puedes poner el ID directamente en el campo 'bot_id_manual'")
              sys.exit(1)

          # -- EXPORTAR BOT (flujo asincrono BLM de AA) --
          import time, zipfile, shutil

          print("Iniciando exportacion asincrona BLM...")
          from datetime import datetime
          export_name = f"{bot_name}_{datetime.utcnow().strftime('%Y%m%d%H%M%S')}"
          print(f"Nombre del export: {export_name}")

          payload = json.dumps({
            "name": export_name,
            "fileIds": [int(bot_id)],
            "includePackages": False,
            "includeTableValues": False
          }).encode("utf-8")
          req = urllib.request.Request(
            aa_url + "/v2/blm/export",
            data=payload, headers=hdrs
          )
          request_id = ""
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              resp = json.loads(r.read().decode("utf-8"))
              request_id = resp.get("requestId", "")
              print(f"Solicitud creada | requestId: {request_id}")
          except urllib.error.HTTPError as e:
            body = e.read().decode("utf-8")
            print(f"ERROR HTTP {e.code} creando solicitud: {body[:300]}")
            sys.exit(1)
          except Exception as e:
            print(f"ERROR creando solicitud: {e}")
            sys.exit(1)

          if not request_id:
            print("ERROR: No se obtuvo requestId")
            sys.exit(1)

          status = ""
          download_file_id = ""
          for intento in range(20):
            time.sleep(4)
            endpoints_status = [
              f"/v2/blm/export/{request_id}",
              f"/v2/blm/status/{request_id}",
            ]
            for ep in endpoints_status:
              try:
                req = urllib.request.Request(
                  aa_url + ep, headers=hdrs, method="GET"
                )
                with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                  resp = json.loads(r.read().decode("utf-8"))
                  status = resp.get("status", "")
                  download_file_id = str(resp.get("downloadFileId", ""))
                  print(f"Intento {intento+1}/20 | Estado: {status} | downloadFileId: {download_file_id}")
                  break
              except urllib.error.HTTPError as e:
                if e.code == 404:
                  continue
                body = e.read().decode("utf-8")
                print(f"HTTP {e.code} en {ep}: {body[:100]}")
              except Exception as e:
                print(f"ERROR en {ep}: {e}")

            if status == "COMPLETED":
              break
            elif status in ["FAILED", "ERROR"]:
              print(f"ERROR: Exportacion fallida: {status}")
              sys.exit(1)

          if status != "COMPLETED":
            print(f"ERROR: Tiempo agotado. Estado final: {status}")
            sys.exit(1)

          if not download_file_id or download_file_id == "None":
            print("WARN: No se obtuvo downloadFileId, usando requestId")
            download_file_id = request_id

          print(f"Descargando paquete | downloadFileId: {download_file_id}...")
          endpoints_download = [
            f"/v2/blm/export/{download_file_id}/file",
            f"/v2/blm/download/{download_file_id}",
            f"/v2/blm/export/{request_id}/file",
          ]
          bot_content = None
          for ep in endpoints_download:
            try:
              req = urllib.request.Request(
                aa_url + ep, headers=hdrs, method="GET"
              )
              with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                bot_content = r.read()
                print(f"[OK] Descargado desde {ep} | {len(bot_content)} bytes")
                break
            except urllib.error.HTTPError as e:
              print(f"HTTP {e.code} en {ep}")
              continue
            except Exception as e:
              print(f"ERROR en {ep}: {e}")
              continue

          if not bot_content:
            print("ERROR: No se pudo descargar el paquete del bot")
            sys.exit(1)

          os.makedirs("/tmp/bots", exist_ok=True)
          zip_path = f"/tmp/bots/{bot_name}.zip"
          open(zip_path, "wb").write(bot_content)
          print(f"Zip guardado: {len(bot_content)} bytes")

          try:
            with zipfile.ZipFile(zip_path, "r") as z:
              z.extractall("/tmp/bots/extracted/")
              archivos = z.namelist()
              print(f"Archivos en zip: {archivos}")

            import os as _os
            bot_file = None

            for root, dirs, files in _os.walk("/tmp/bots/extracted/"):
              for fname in files:
                fpath = _os.path.join(root, fname)
                if fname == "manifest.json":
                  continue
                if "Metadata" in root:
                  continue
                if fname == bot_name or not fname.endswith((".png",".xml",".json")):
                  bot_file = fpath
                  print(f"Bot encontrado: {fpath}")
                  break
              if bot_file:
                break

            if not bot_file:
              candidates = []
              for root, dirs, files in _os.walk("/tmp/bots/extracted/"):
                for fname in files:
                  if "Metadata" in root or fname == "manifest.json":
                    continue
                  if fname.endswith((".png", ".xml")):
                    continue
                  fpath = _os.path.join(root, fname)
                  candidates.append((fpath, _os.path.getsize(fpath)))
              if candidates:
                candidates.sort(key=lambda x: x[1], reverse=True)
                bot_file = candidates[0][0]
                print(f"Bot seleccionado (mas grande): {bot_file}")

            if bot_file:
              shutil.copy(bot_file, f"/tmp/bots/{bot_name}")
              print(f"[OK] Bot copiado para analisis: {bot_name}")
            else:
              print("WARN: No se encontro el archivo del bot, usando primer archivo")
              shutil.copy(f"/tmp/bots/extracted/{archivos[0]}", f"/tmp/bots/{bot_name}")

          except Exception as e:
            print(f"WARN: Error extrayendo zip: {e}")
            shutil.copy(zip_path, f"/tmp/bots/{bot_name}")
            print(f"[OK] Archivo guardado directamente como: {bot_name}")

          open("/tmp/aa_token.txt", "w").write(token)
          open("/tmp/bot_id.txt", "w").write(bot_id)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"bot_id={bot_id}\n")
            f.write(f"bot_nombre={bot_name}\n")
            f.write(f"bot_carpeta={bot_folder}\n")
          PYEOF

      # -----------------------------------------------------------------
      # ANALISIS DEL BOT
      # -----------------------------------------------------------------
      - name: Validar sintaxis JSON
        env:
          BOT_NOMBRE: ${{ steps.buscar_bot.outputs.bot_nombre }}
        run: |
          set +e
          echo "=============================="
          echo "  VALIDACION DE SINTAXIS JSON"
          echo "=============================="
          ERRORS=0
          BOT_FILE="/tmp/bots/$BOT_NOMBRE"
          [ ! -f "$BOT_FILE" ] && BOT_FILE=$(find /tmp/bots/ -type f -not -name "*.zip" -not -name "manifest.json" -not -name "*.png" -not -name "*.xml" | head -1)
          echo "Validando: $BOT_FILE"
          if python3 -c "import json; json.load(open('$BOT_FILE'))" 2>/dev/null; then
            echo "[OK] Sintaxis JSON valida: $(basename $BOT_FILE)"
          else
            echo "[ERROR] Sintaxis invalida: $(basename $BOT_FILE)"
            ERRORS=$((ERRORS + 1))
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS archivo(s) con sintaxis JSON invalida"
            exit 1
          fi
          echo "[OK] Todos los archivos tienen sintaxis JSON valida"

      - name: Escanear credenciales expuestas
        id: credential_scan
        env:
          BOT_NOMBRE: ${{ steps.buscar_bot.outputs.bot_nombre }}
        run: |
          set +e
          echo "=============================="
          echo "  DETECCION DE CREDENCIALES"
          echo "=============================="
          VIOLATIONS=0
          CRED_DETAILS=""

          BOT_FILE="/tmp/bots/$BOT_NOMBRE"
          if [ ! -f "$BOT_FILE" ]; then
            echo "[WARN] No se encontro el bot en /tmp/bots/$BOT_NOMBRE"
            BOT_FILE=$(find /tmp/bots/ -type f -not -name "*.zip" -not -name "manifest.json" -not -name "*.png" -not -name "*.xml" | head -1)
          fi
          echo "Analizando credenciales en: $BOT_FILE"

          if [ -f "$BOT_FILE" ]; then
            FILE_WARNED=0

            for var in password passwd secret api_key apikey token connectionstring; do
              if grep -qi "\"variableName\".*\".*${var}.*\"" "$BOT_FILE" 2>/dev/null; then
                echo "[ERROR] Variable sensible encontrada: $var"
                CRED_DETAILS="${CRED_DETAILS}Variable sensible: $var;"
                FILE_WARNED=1
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done

            for pattern in "jdbc:" "mongodb://" "postgresql://" "mysql://" "password=" "pwd="; do
              if grep -q "$pattern" "$BOT_FILE" 2>/dev/null; then
                echo "[ERROR] Credencial hardcodeada detectada: $pattern"
                CRED_DETAILS="${CRED_DETAILS}Credencial hardcodeada: $pattern;"
                FILE_WARNED=1
                VIOLATIONS=$((VIOLATIONS + 1))
              fi
            done

            [ "$FILE_WARNED" -eq 0 ] && echo "[OK] Sin credenciales expuestas: $(basename $BOT_FILE)"
          else
            echo "[WARN] No se encontro archivo de bot para analizar"
          fi

          echo "Total violations de credenciales: $VIOLATIONS"
          echo "credential_violations=$VIOLATIONS" >> $GITHUB_OUTPUT
          echo "credential_details=$CRED_DETAILS" >> $GITHUB_OUTPUT

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::$VIOLATIONS credencial(es) expuesta(s) encontrada(s) - bot bloqueado"
          fi
          exit 0

      - name: Verificar buenas practicas
        id: best_practices
        env:
          BOT_NOMBRE: ${{ steps.buscar_bot.outputs.bot_nombre }}
        run: |
          set +e
          echo "=============================="
          echo "  BUENAS PRACTICAS"
          echo "=============================="
          BOT_FILE="/tmp/bots/$BOT_NOMBRE"
          [ ! -f "$BOT_FILE" ] && BOT_FILE=$(find /tmp/bots/ -type f -not -name "*.zip" -not -name "manifest.json" -not -name "*.png" -not -name "*.xml" | head -1)

          BP_TRY="false"; BP_COMMENTS=0; BP_VAULT="false"
          for file in "$BOT_FILE"; do
            [ -f "$file" ] || continue
            echo "Bot: $(basename $file)"
            if grep -q '"commandName":"try"' "$file"; then
              echo "  [OK] Tiene manejo de errores"
              BP_TRY="true"
            else
              echo "  [WARN] Sin try/catch"
            fi
            BP_COMMENTS=$(grep -c '"commandName":"Comment"' "$file" 2>/dev/null || echo 0)
            [ "$BP_COMMENTS" -gt 0 ] \
              && echo "  [OK] Tiene $BP_COMMENTS comentario(s)" \
              || echo "  [WARN] Sin comentarios"
            if grep -q '"lockerName"' "$file"; then
              echo "  [OK] Usa Credential Vault"
              BP_VAULT="true"
            else
              echo "  [INFO] No usa Credential Vault"
            fi
          done

          mkdir -p /tmp/reports
          printf '{"try_catch": %s, "comments": %d, "credential_vault": %s}' \
            "$BP_TRY" "$BP_COMMENTS" "$BP_VAULT" > /tmp/reports/best_practices.json
          echo "Best practices guardadas"
          exit 0

      - name: Code Analysis de AA via API
        id: code_analysis
        env:
          AA_URL:           ${{ secrets.AA_URL }}
          AA_USERNAME:      ${{ secrets.AA_USERNAME }}
          AA_API_KEY:       ${{ secrets.AA_API_KEY }}
          AA_AUTH_ENDPOINT: ${{ secrets.AA_AUTH_ENDPOINT }}
          BOT_ID:           ${{ steps.buscar_bot.outputs.bot_id }}
          BOT_NOMBRE:       ${{ steps.buscar_bot.outputs.bot_nombre }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, ssl, os, sys

          aa_url    = os.environ["AA_URL"]
          username  = os.environ["AA_USERNAME"]
          api_key   = os.environ["AA_API_KEY"]
          endpoint  = os.environ.get("AA_AUTH_ENDPOINT", "/v2/authentication")
          bot_id    = os.environ["BOT_ID"]
          bot_name  = os.environ["BOT_NOMBRE"]

          ctx = ssl.create_default_context()

          payload = json.dumps({"username": username, "apiKey": api_key}).encode("utf-8")
          req = urllib.request.Request(
            aa_url + endpoint, data=payload,
            headers={"Content-Type": "application/json"}
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              token = json.loads(r.read().decode("utf-8")).get("token", "")
          except Exception as e:
            print(f"ERROR login: {e}")
            sys.exit(0)

          hdrs    = {"Content-Type": "application/json", "X-Authorization": token}
          payload = json.dumps({"fileId": bot_id, "excludeChildBots": True}).encode("utf-8")

          crit=0; high=0; low=0; issues=[]
          try:
            req = urllib.request.Request(
              aa_url + "/v2/policy/bot/analysis", data=payload, headers=hdrs
            )
            with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
              s = json.loads(r.read().decode("utf-8")).get("ruleViolationSummary", {})
              crit = s.get("criticalSeverityCount", 0)
              high = s.get("highSeverityCount", 0)
              low  = s.get("lowSeverityCount", 0)
              print(f"Code Analysis -> Critical:{crit} High:{high} Low:{low}")
          except Exception as e:
            print(f"ERROR Code Analysis: {e}", file=sys.stderr)

          try:
            req = urllib.request.Request(
              aa_url + "/v2/policy/bot/analysis/details", data=payload, headers=hdrs
            )
            with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
              entries = json.loads(r.read().decode("utf-8")).get(
                "ruleViolationReport", {}
              ).get("ruleViolationEntries", [])
              for entry in entries:
                var_name = entry.get("variable", {}).get("name", "N/A")
                for v in entry.get("ruleViolations", []):
                  issues.append({
                    "variable": var_name,
                    "rule":     v.get("ruleName", ""),
                    "label":    v.get("ruleLabel", ""),
                    "severity": v.get("ruleSeverity", ""),
                  })
          except Exception as e:
            print(f"ERROR detalles: {e}", file=sys.stderr)

          report = {"bot": bot_name, "critical": crit, "high": high, "low": low, "issues": issues}
          os.makedirs("/tmp/reports", exist_ok=True)
          with open("/tmp/reports/aa_analysis.json", "w") as f:
            json.dump(report, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"total_critical={crit}\n")
            f.write(f"total_high={high}\n")
            f.write(f"total_low={low}\n")

          print(f"Reporte guardado: Critical={crit} High={high} Low={low}")
          PYEOF

      - name: Subir reporte como artifact
        uses: actions/upload-artifact@v4
        with:
          name: reporte-analisis
          path: /tmp/reports/
          retention-days: 7

      - name: Generar reporte HTML
        id: generar_reporte
        env:
          BOT_NOMBRE:            ${{ steps.buscar_bot.outputs.bot_nombre }}
          BOT_CARPETA:           ${{ steps.buscar_bot.outputs.bot_carpeta }}
          RUN_ID:                ${{ github.run_id }}
          REPO:                  ${{ github.repository }}
          CREDENTIAL_VIOLATIONS: ${{ steps.credential_scan.outputs.credential_violations }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          bot_name   = os.environ["BOT_NOMBRE"]
          bot_folder = os.environ["BOT_CARPETA"]
          run_id     = os.environ["RUN_ID"]
          repo       = os.environ["REPO"]

          # --- Code Analysis ---
          report = {"bot": bot_name, "critical": 0, "high": 0, "low": 0, "issues": []}
          if os.path.exists("/tmp/reports/aa_analysis.json"):
            with open("/tmp/reports/aa_analysis.json") as f:
              report = json.load(f)
          c      = report.get("critical", 0)
          h      = report.get("high", 0)
          l      = report.get("low", 0)
          issues = report.get("issues", [])

          # --- Credenciales ---
          cred_viol = int(os.environ.get("CREDENTIAL_VIOLATIONS", "0"))

          # --- Buenas practicas ---
          bp = {"try_catch": False, "comments": 0, "credential_vault": False}
          if os.path.exists("/tmp/reports/best_practices.json"):
            with open("/tmp/reports/best_practices.json") as f:
              bp = json.load(f)
          bp_try   = bp.get("try_catch", False)
          bp_cmts  = int(bp.get("comments", 0))
          bp_vault = bp.get("credential_vault", False)

          # --- Gate: considera TODO ---
          bloqueado = c > 0 or h > 0 or cred_viol > 0
          if bloqueado:
            gate_color = "#dc3545"
            razones_gate = []
            if c > 0:         razones_gate.append(f"{c} violation(es) Critical en Code Analysis")
            if h > 0:         razones_gate.append(f"{h} violation(es) High en Code Analysis")
            if cred_viol > 0: razones_gate.append(f"{cred_viol} credencial(es) expuesta(s)")
            gate_status = "RECHAZADO - " + " | ".join(razones_gate)
          else:
            gate_color  = "#28a745"
            gate_status = "APROBADO - Listo para pasar a Publica"

          # --- Filas violations Code Analysis ---
          issues_rows = ""
          for issue in issues:
            sev   = issue.get("severity", "")
            color = "#dc3545" if sev == "CRITICAL" else "#ff6600" if sev == "HIGH" else "#ffc107"
            issues_rows += f"""
            <tr>
              <td>{issue.get('variable','')}</td>
              <td>{issue.get('rule','')}</td>
              <td>{issue.get('label','')}</td>
              <td style="color:{color};font-weight:bold">{sev}</td>
            </tr>"""

          # --- Filas validaciones con resultado real ---
          def val_row(label, ok, detail=""):
            icon  = "&#10003;" if ok else "&#9888;"
            color = "#28a745" if ok else "#e67e22"
            text  = detail if detail else ("Correcto" if ok else "Advertencia")
            bg    = "#f0fff4" if ok else "#fff8f0"
            return f"<tr style='background:{bg}'><td>{icon} {label}</td><td style='color:{color};font-weight:bold'>{text}</td></tr>"

          val_rows  = val_row("Sintaxis JSON", True, "Valida")
          val_rows += val_row("Credenciales expuestas", cred_viol == 0,
                              "Sin credenciales hardcodeadas" if cred_viol == 0 else f"{cred_viol} credencial(es) encontrada(s)")
          val_rows += val_row("Manejo de errores (try/catch)", bp_try,
                              "Implementado" if bp_try else "Sin bloque try/catch")
          val_rows += val_row("Comentarios en el bot", bp_cmts > 0,
                              f"{bp_cmts} comentario(s)" if bp_cmts > 0 else "Sin comentarios")
          val_rows += val_row("Credential Vault", bp_vault,
                              "Usa Credential Vault" if bp_vault else "No usa Credential Vault (informativo)")
          val_rows += val_row("Code Analysis AA", c == 0 and h == 0,
                              "Sin violations criticas" if c == 0 and h == 0 else f"{c} Critical / {h} High")

          url = f"https://github.com/{repo}/actions/runs/{run_id}"

          html = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Reporte AA - {bot_name}</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 30px; color: #333; }}
              h1 {{ color: #0078d4; }}
              h2 {{ border-bottom: 2px solid #0078d4; padding-bottom: 5px; margin-top: 25px; }}
              table {{ border-collapse: collapse; width: 100%; margin-top: 10px; }}
              th {{ background: #0078d4; color: white; padding: 10px; text-align: left; }}
              td {{ border: 1px solid #ddd; padding: 8px; }}
              .gate {{ padding: 20px; border-radius: 8px; text-align: center;
                       font-size: 16px; font-weight: bold; margin: 20px 0;
                       background: {gate_color}22; border: 2px solid {gate_color}; color: {gate_color}; }}
              .info {{ background: #e7f3ff; border-left: 4px solid #0078d4;
                       padding: 15px; margin: 15px 0; border-radius: 4px; }}
              .btn {{ background: #0078d4; color: white; padding: 12px 24px;
                      text-decoration: none; border-radius: 5px; display: inline-block; }}
            </style>
          </head>
          <body>
            <h1>Reporte DevSecOps - Automation Anywhere</h1>
            <div class="info">
              <strong>Bot analizado:</strong> {bot_name}<br>
              <strong>Carpeta:</strong> {bot_folder}<br>
              <strong>Run ID:</strong> {run_id}
            </div>

            <h2>Estado del Gate DevSecOps</h2>
            <div class="gate">{gate_status}</div>

            <h2>Validaciones realizadas</h2>
            <table>
              <tr><th>Validacion</th><th>Resultado</th></tr>
              {val_rows}
            </table>

            <h2>Resumen Code Analysis</h2>
            <table>
              <tr><th>Severidad</th><th>Cantidad</th></tr>
              <tr><td style="color:darkred;font-weight:bold">Critical</td><td>{c}</td></tr>
              <tr><td style="color:red">High</td><td>{h}</td></tr>
              <tr><td style="color:orange">Low</td><td>{l}</td></tr>
            </table>

            <h2>Detalle de Violations (Code Analysis)</h2>
            <table>
              <tr><th>Variable</th><th>Regla</th><th>Descripcion</th><th>Severidad</th></tr>
              {issues_rows if issues_rows else "<tr><td colspan='4' style='text-align:center'>Sin violations</td></tr>"}
            </table>

            <br>
            <a class="btn" href="{url}">Ver detalle en GitHub Actions</a>
            <hr style="margin-top:40px">
            <p style="color:gray;font-size:12px">Generado automaticamente - DevSecOps AA Pipeline</p>
          </body>
          </html>"""

          os.makedirs("/tmp/reports", exist_ok=True)
          with open("/tmp/reports/reporte_final.html", "w") as f:
            f.write(html)
          print("Reporte HTML generado")
          PYEOF

      - name: Subir reporte HTML
        uses: actions/upload-artifact@v4
        with:
          name: reporte-html
          path: /tmp/reports/reporte_final.html
          retention-days: 7

# =================================================================
# JOB 2: NOTIFICAR AL LIDER
# =================================================================
  notificar_lider:
    name: '2. Notificar al lider por correo'
    runs-on: ubuntu-latest
    needs:
      - exportar_bot

    steps:
      - name: Descargar reporte HTML
        uses: actions/download-artifact@v4
        with:
          name: reporte-html
          path: /tmp/reports/

      - name: Enviar reporte completo al lider
        env:
          MAIL_USERNAME:         ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:         ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO:               ${{ secrets.MAIL_TO }}
          BOT_NOMBRE:            ${{ needs.exportar_bot.outputs.bot_nombre }}
          TOTAL_CRITICAL:        ${{ needs.exportar_bot.outputs.total_critical }}
          TOTAL_HIGH:            ${{ needs.exportar_bot.outputs.total_high }}
          CREDENTIAL_VIOLATIONS: ${{ needs.exportar_bot.outputs.credential_violations }}
          RUN_ID:                ${{ github.run_id }}
          REPO:                  ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import smtplib, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          mail_from     = os.environ["MAIL_USERNAME"]
          mail_pass     = os.environ["MAIL_PASSWORD"]
          mail_to_list  = [m.strip() for m in os.environ["MAIL_TO"].split(",")]
          bot_name      = os.environ["BOT_NOMBRE"]
          critical      = int(os.environ.get("TOTAL_CRITICAL", 0))
          high          = int(os.environ.get("TOTAL_HIGH", 0))
          cred_viol     = int(os.environ.get("CREDENTIAL_VIOLATIONS", 0))
          run_id        = os.environ["RUN_ID"]
          repo          = os.environ["REPO"]
          url           = f"https://github.com/{repo}/actions/runs/{run_id}"

          bloqueado = critical > 0 or high > 0 or cred_viol > 0
          emoji     = "[ERROR]" if bloqueado else "[OK]"
          estado    = "RECHAZADO" if bloqueado else "APROBADO"

          reporte_html = ""
          if os.path.exists("/tmp/reports/reporte_final.html"):
            with open("/tmp/reports/reporte_final.html", "r") as f:
              reporte_html = f.read()

          if reporte_html:
            body_html = reporte_html
          else:
            razones = []
            if critical > 0: razones.append(f"{critical} violation(es) Critical")
            if high > 0:     razones.append(f"{high} violation(es) High")
            if cred_viol > 0: razones.append(f"{cred_viol} credencial(es) expuesta(s)")
            razones_html = "".join(f"<li>{r}</li>" for r in razones)
            color = "#dc3545" if bloqueado else "#28a745"
            body_html = f"""
            <html><body style="font-family:Arial,sans-serif;margin:20px">
              <h2 style="color:#0078d4">{emoji} Resultado DevSecOps - {bot_name}</h2>
              <div style="padding:15px;border-radius:8px;background:{color}22;
                          border:2px solid {color};color:{color};
                          font-weight:bold;text-align:center;margin:20px 0">
                {estado}
              </div>
              <ul>{razones_html}</ul>
              <a href="{url}" style="background:#0078d4;color:white;padding:12px 24px;
                 text-decoration:none;border-radius:5px;display:inline-block">
                Ver detalle en GitHub Actions
              </a>
            </body></html>"""

          subject = f"[DevSecOps AA] {emoji} Bot '{bot_name}' - {estado}"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = mail_from
          msg["To"]      = ", ".join(mail_to_list)
          msg.attach(MIMEText(body_html, "html"))

          try:
            with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(mail_from, mail_pass)
              server.sendmail(mail_from, mail_to_list, msg.as_string())
              print(f"Correo enviado a: {mail_to_list}")
          except Exception as e:
            print(f"ERROR enviando correo: {e}")
          PYEOF

# =================================================================
# JOB 3: CHECK-IN A PUBLICA EN AA
# Solo corre si no hay violations Critical/High ni credenciales
# =================================================================
  publicar_bot:
    name: '3. Check-in a Publica en AA'
    runs-on: ubuntu-latest
    needs:
      - exportar_bot
      - notificar_lider
    if: ${{ needs.exportar_bot.outputs.total_critical == '0' && needs.exportar_bot.outputs.total_high == '0' && needs.exportar_bot.outputs.credential_violations == '0' }}

    steps:
      - name: Check-in del bot a carpeta Publica
        env:
          AA_URL:           ${{ secrets.AA_URL }}
          AA_USERNAME:      ${{ secrets.AA_USERNAME }}
          AA_API_KEY:       ${{ secrets.AA_API_KEY }}
          AA_AUTH_ENDPOINT: ${{ secrets.AA_AUTH_ENDPOINT }}
          BOT_ID:           ${{ needs.exportar_bot.outputs.bot_id }}
          BOT_NOMBRE:       ${{ needs.exportar_bot.outputs.bot_nombre }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, ssl, os, sys

          aa_url   = os.environ["AA_URL"]
          username = os.environ["AA_USERNAME"]
          api_key  = os.environ["AA_API_KEY"]
          endpoint = os.environ.get("AA_AUTH_ENDPOINT", "/v2/authentication")
          bot_id   = os.environ["BOT_ID"]
          bot_name = os.environ["BOT_NOMBRE"]

          ctx = ssl.create_default_context()

          payload = json.dumps({"username": username, "apiKey": api_key}).encode("utf-8")
          req = urllib.request.Request(
            aa_url + endpoint, data=payload,
            headers={"Content-Type": "application/json"}
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              token = json.loads(r.read().decode("utf-8")).get("token", "")
          except Exception as e:
            print(f"ERROR login: {e}")
            sys.exit(1)

          hdrs = {"Content-Type": "application/json", "X-Authorization": token}

          # PUT /v3/repository/checkin - capturado del Network del navegador
          print(f"Haciendo check-in del bot ID {bot_id} a Publica...")

          checkin_payload = json.dumps({
            "ids": [str(bot_id)],
            "comment": "Auto check-in DevSecOps pipeline"
          }).encode("utf-8")

          req = urllib.request.Request(
            aa_url + "/v3/repository/checkin",
            data=checkin_payload,
            headers=hdrs,
            method="PUT"
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              resp = r.read().decode("utf-8")
              print(f"[OK] Check-in exitoso -> Publica")
              print(f"     Respuesta: {resp[:200]}")
          except urllib.error.HTTPError as e:
            body_err = e.read().decode("utf-8")
            print(f"ERROR HTTP {e.code}: {body_err[:300]}")
            sys.exit(1)
          except Exception as e:
            print(f"ERROR: {e}")
            sys.exit(1)
          PYEOF

# =================================================================
# JOB RESUMEN: Siempre corre al final
# =================================================================
  resumen:
    name: 'Resultado del pipeline'
    runs-on: ubuntu-latest
    needs:
      - exportar_bot
      - notificar_lider
      - publicar_bot
    if: always()
    steps:
      - name: Mostrar resultado
        env:
          TOTAL_CRITICAL:        ${{ needs.exportar_bot.outputs.total_critical }}
          TOTAL_HIGH:            ${{ needs.exportar_bot.outputs.total_high }}
          CREDENTIAL_VIOLATIONS: ${{ needs.exportar_bot.outputs.credential_violations }}
          BOT_NOMBRE:            ${{ needs.exportar_bot.outputs.bot_nombre }}
          PUBLICAR_RESULT:       ${{ needs.publicar_bot.result }}
        run: |
          echo "============================================"
          echo "  RESULTADO FINAL - DevSecOps AA Pipeline"
          echo "============================================"
          echo "Bot: $BOT_NOMBRE"
          echo "Code Analysis Critical: $TOTAL_CRITICAL"
          echo "Code Analysis High:     $TOTAL_HIGH"
          echo "Credenciales expuestas: $CREDENTIAL_VIOLATIONS"
          echo "--------------------------------------------"
          if [ "$PUBLICAR_RESULT" = "success" ]; then
            echo "[OK] BOT APROBADO Y PUBLICADO EN PUBLICA"
          elif [ "$PUBLICAR_RESULT" = "skipped" ]; then
            echo "[RECHAZADO] BOT NO PASO A PUBLICA"
            echo "Motivos:"
            [ "$TOTAL_CRITICAL" -gt 0 ] 2>/dev/null && echo "  - $TOTAL_CRITICAL violation(es) Critical en Code Analysis"
            [ "$TOTAL_HIGH" -gt 0 ] 2>/dev/null && echo "  - $TOTAL_HIGH violation(es) High en Code Analysis"
            [ "$CREDENTIAL_VIOLATIONS" -gt 0 ] 2>/dev/null && echo "  - $CREDENTIAL_VIOLATIONS credencial(es) expuesta(s)"
            echo "Revisa el correo enviado al lider para el detalle completo."
          else
            echo "[ERROR] El check-in a Publica fallo - revisa los logs"
          fi
          echo "============================================"
