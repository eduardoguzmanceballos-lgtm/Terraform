# =================================================================
# PIPELINE DEVSECOPS - AUTOMATION ANYWHERE
# GitHub Actions - v10 (multi-bot)
#
# Flujo:
#   1. Dev ejecuta el pipeline manualmente
#   2. Pone la carpeta y opcionalmente IDs separados por coma
#   3. Pipeline descubre, exporta y analiza todos los bots
#   4. Gate global: si uno falla, ninguno pasa
#   5. Envia correo con tabla resumen de todos los bots
#   6. Si todos pasan -> check-in de todos a Publica en un solo llamado
#
# SECRETS requeridos:
#   AA_URL            -> URL del Control Room
#   AA_USERNAME       -> usuario de servicio
#   AA_API_KEY        -> API key del usuario
#   AA_AUTH_ENDPOINT  -> /v2/authentication
#   MAIL_USERNAME     -> correo que envia (Gmail)
#   MAIL_PASSWORD     -> app password del correo
#   MAIL_TO           -> correo(s) del lider, separados por coma
# =================================================================

name: AA DevSecOps Pipeline

on:
  workflow_dispatch:
    inputs:
      bot_carpeta:
        description: 'Nombre de la carpeta (para mostrar en el reporte, ej: Bots/DevSecOps)'
        required: true
        type: string
      bot_folder_id:
        description: 'ID de la carpeta en AA (lo ves en la URL: .../folders/1575863)'
        required: false
        type: string
        default: ''
      bot_ids_manual:
        description: 'IDs de bots separados por coma (opcional - si se llena, ignora la carpeta)'
        required: false
        type: string
        default: ''

# =================================================================
# JOB 1: DESCUBRIR, EXPORTAR Y ANALIZAR TODOS LOS BOTS
# =================================================================
jobs:
  analizar_bots:
    name: '1. Descubrir, exportar y analizar bots'
    runs-on: ubuntu-latest
    outputs:
      gate_ok:      ${{ steps.gate.outputs.gate_ok }}
      bots_count:   ${{ steps.gate.outputs.bots_count }}
      bots_fallidos: ${{ steps.gate.outputs.bots_fallidos }}
      bot_ids_json: ${{ steps.gate.outputs.bot_ids_json }}

    steps:
      - name: Descubrir bots en AA
        id: descubrir
        env:
          AA_URL:           ${{ secrets.AA_URL }}
          AA_USERNAME:      ${{ secrets.AA_USERNAME }}
          AA_API_KEY:       ${{ secrets.AA_API_KEY }}
          AA_AUTH_ENDPOINT: ${{ secrets.AA_AUTH_ENDPOINT }}
          BOT_CARPETA:      ${{ github.event.inputs.bot_carpeta }}
          BOT_FOLDER_ID:    ${{ github.event.inputs.bot_folder_id }}
          BOT_IDS_MANUAL:   ${{ github.event.inputs.bot_ids_manual }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, ssl, os, sys

          aa_url     = os.environ["AA_URL"]
          username   = os.environ["AA_USERNAME"]
          api_key    = os.environ["AA_API_KEY"]
          endpoint   = os.environ.get("AA_AUTH_ENDPOINT", "/v2/authentication")
          bot_folder = os.environ["BOT_CARPETA"]
          folder_id  = os.environ.get("BOT_FOLDER_ID", "").strip()
          ids_manual = os.environ.get("BOT_IDS_MANUAL", "").strip()

          ctx = ssl.create_default_context()

          # Login
          payload = json.dumps({"username": username, "apiKey": api_key}).encode("utf-8")
          req = urllib.request.Request(
            aa_url + endpoint, data=payload,
            headers={"Content-Type": "application/json"}
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              token = json.loads(r.read().decode("utf-8")).get("token", "")
            if not token:
              print("ERROR: Token vacio"); sys.exit(1)
            print("Login exitoso")
          except Exception as e:
            print(f"ERROR login: {e}"); sys.exit(1)

          hdrs = {"Content-Type": "application/json", "X-Authorization": token}

          # Guardar token para steps siguientes
          os.makedirs("/tmp/aa", exist_ok=True)
          open("/tmp/aa/token.txt", "w").write(token)

          bots = []

          if ids_manual:
            # Modo IDs manuales: resolvemos nombre de cada ID via API
            print(f"Modo IDs manuales: {ids_manual}")
            ids = [i.strip() for i in ids_manual.split(",") if i.strip()]
            for bot_id in ids:
              try:
                payload = json.dumps({
                  "filter": {"operator": "eq", "field": "id", "value": bot_id},
                  "fields": ["id", "name", "path"],
                  "page": {"offset": 0, "length": 1}
                }).encode("utf-8")
                req = urllib.request.Request(
                  aa_url + "/v2/repository/file/list", data=payload, headers=hdrs
                )
                with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                  items = json.loads(r.read().decode("utf-8")).get("list", [])
                  if items:
                    item = items[0]
                    bots.append({"id": str(item["id"]), "nombre": item["name"]})
                    print(f"  [OK] ID {bot_id} -> {item['name']}")
                  else:
                    # Si no lo encuentra igual lo agrega con nombre desconocido
                    bots.append({"id": bot_id, "nombre": f"Bot_{bot_id}"})
                    print(f"  [WARN] ID {bot_id} no encontrado en repositorio, se usara igual")
              except Exception as e:
                print(f"  [WARN] Error buscando ID {bot_id}: {e}")
                bots.append({"id": bot_id, "nombre": f"Bot_{bot_id}"})
          else:
            # Modo carpeta: POST /v2/repository/folders/{folder_id}/list
            # Endpoint capturado del Network del navegador
            if not folder_id:
              print("ERROR: Debes proporcionar bot_folder_id o bot_ids_manual")
              print("  El folder_id lo ves en la URL de AA: .../folders/1575863")
              sys.exit(1)

            print(f"Modo carpeta: buscando bots en carpeta ID={folder_id} ({bot_folder})...")
            try:
              payload = json.dumps({
                "fields": [],
                "filter": None,
                "page": {"offset": 0, "length": 100},
                "sort": [
                  {"field": "directory", "direction": "desc"},
                  {"field": "type", "direction": "desc"},
                  {"field": "name", "direction": "asc"}
                ]
              }).encode("utf-8")
              req = urllib.request.Request(
                aa_url + f"/v2/repository/folders/{folder_id}/list",
                data=payload, headers=hdrs, method="POST"
              )
              with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                resp = json.loads(r.read().decode("utf-8"))
                items = resp.get("list", [])
                print(f"Items encontrados en carpeta: {len(items)}")
                for item in items:
                  item_id   = str(item.get("id", ""))
                  item_name = item.get("name", "")
                  item_type = item.get("type", item.get("fileType", ""))
                  print(f"  ID: {item_id} | Nombre: {item_name} | Tipo: {item_type}")
                  # Excluir subcarpetas (type = directory/folder), incluir bots
                  if item_id and item_name and "folder" not in item_type.lower() and "directory" not in item_type.lower():
                    bots.append({"id": item_id, "nombre": item_name})
                    print(f"  [OK] Bot incluido: {item_name}")
            except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8")
              print(f"ERROR HTTP {e.code}: {body[:300]}")
              sys.exit(1)
            except Exception as e:
              print(f"ERROR listando carpeta: {e}")
              sys.exit(1)

          if not bots:
            print(f"ERROR: No se encontraron bots en la carpeta ID={folder_id} ({bot_folder})")
            print("  Verifica que el folder_id es correcto y la carpeta tiene bots en AA Privada")
            sys.exit(1)

          print(f"\nBots a procesar: {len(bots)}")
          for b in bots:
            print(f"  -> {b['nombre']} (ID: {b['id']})")

          with open("/tmp/aa/bots.json", "w") as f:
            json.dump(bots, f, indent=2)
          print(f"\nbots.json guardado con {len(bots)} bot(s)")
          PYEOF

      - name: Exportar y analizar cada bot
        id: analizar
        env:
          AA_URL:           ${{ secrets.AA_URL }}
          AA_USERNAME:      ${{ secrets.AA_USERNAME }}
          AA_API_KEY:       ${{ secrets.AA_API_KEY }}
          AA_AUTH_ENDPOINT: ${{ secrets.AA_AUTH_ENDPOINT }}
          BOT_CARPETA:      ${{ github.event.inputs.bot_carpeta }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, ssl, os, sys, time, zipfile, shutil
          from datetime import datetime

          aa_url    = os.environ["AA_URL"]
          username  = os.environ["AA_USERNAME"]
          api_key   = os.environ["AA_API_KEY"]
          endpoint  = os.environ.get("AA_AUTH_ENDPOINT", "/v2/authentication")

          ctx = ssl.create_default_context()

          # Login
          payload = json.dumps({"username": username, "apiKey": api_key}).encode("utf-8")
          req = urllib.request.Request(
            aa_url + endpoint, data=payload,
            headers={"Content-Type": "application/json"}
          )
          with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
            token = json.loads(r.read().decode("utf-8")).get("token", "")
          hdrs = {"Content-Type": "application/json", "X-Authorization": token}

          # Leer lista de bots
          with open("/tmp/aa/bots.json") as f:
            bots = json.load(f)

          os.makedirs("/tmp/bots", exist_ok=True)
          os.makedirs("/tmp/reports", exist_ok=True)

          resultados = []

          for bot in bots:
            bot_id   = bot["id"]
            bot_name = bot["nombre"]
            print(f"\n{'='*50}")
            print(f"Procesando: {bot_name} (ID: {bot_id})")
            print(f"{'='*50}")

            resultado = {
              "id":       bot_id,
              "nombre":   bot_name,
              "critical": 0,
              "high":     0,
              "low":      0,
              "cred_viol": 0,
              "cred_details": [],
              "bp_try":   False,
              "bp_cmts":  0,
              "bp_vault": False,
              "issues":   [],
              "estado":   "APROBADO",
              "errores":  []
            }

            # ---- EXPORTAR ----
            try:
              export_name = f"{bot_name}_{datetime.utcnow().strftime('%Y%m%d%H%M%S')}"
              payload = json.dumps({
                "name": export_name,
                "fileIds": [int(bot_id)],
                "includePackages": False,
                "includeTableValues": False
              }).encode("utf-8")
              req = urllib.request.Request(
                aa_url + "/v2/blm/export", data=payload, headers=hdrs
              )
              with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                request_id = json.loads(r.read().decode("utf-8")).get("requestId", "")
              print(f"Export iniciado | requestId: {request_id}")

              # Esperar COMPLETED
              status = ""; download_file_id = ""
              for intento in range(20):
                time.sleep(4)
                for ep in [f"/v2/blm/export/{request_id}", f"/v2/blm/status/{request_id}"]:
                  try:
                    req = urllib.request.Request(aa_url + ep, headers=hdrs, method="GET")
                    with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
                      resp = json.loads(r.read().decode("utf-8"))
                      status = resp.get("status", "")
                      download_file_id = str(resp.get("downloadFileId", ""))
                      print(f"  Intento {intento+1} | {status} | dlId: {download_file_id}")
                      break
                  except urllib.error.HTTPError as e:
                    if e.code == 404: continue
                if status == "COMPLETED": break
                elif status in ["FAILED", "ERROR"]:
                  raise Exception(f"Export fallido: {status}")

              if status != "COMPLETED":
                raise Exception(f"Timeout esperando export. Estado: {status}")

              if not download_file_id or download_file_id == "None":
                download_file_id = request_id

              # Descargar zip
              bot_content = None
              for ep in [f"/v2/blm/download/{download_file_id}", f"/v2/blm/export/{download_file_id}/file"]:
                try:
                  req = urllib.request.Request(aa_url + ep, headers=hdrs, method="GET")
                  with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                    bot_content = r.read()
                    print(f"[OK] Descargado: {len(bot_content)} bytes")
                    break
                except: continue

              if not bot_content:
                raise Exception("No se pudo descargar el zip del bot")

              # Extraer archivo del bot
              zip_path = f"/tmp/bots/{bot_name}.zip"
              open(zip_path, "wb").write(bot_content)

              bot_file = None
              try:
                extract_dir = f"/tmp/bots/extracted_{bot_id}"
                with zipfile.ZipFile(zip_path, "r") as z:
                  z.extractall(extract_dir)
                  archivos = z.namelist()

                import os as _os
                # Buscar archivo del bot (no metadata, no manifest)
                candidates = []
                for root, dirs, files in _os.walk(extract_dir):
                  for fname in files:
                    if fname == "manifest.json" or "Metadata" in root: continue
                    if fname.endswith((".png", ".xml")): continue
                    fpath = _os.path.join(root, fname)
                    candidates.append((fpath, _os.path.getsize(fpath)))

                if candidates:
                  candidates.sort(key=lambda x: x[1], reverse=True)
                  bot_file = candidates[0][0]
                  dest = f"/tmp/bots/{bot_name}"
                  shutil.copy(bot_file, dest)
                  print(f"[OK] Bot extraido: {bot_file}")
              except Exception as e:
                print(f"WARN extraccion: {e}")
                shutil.copy(zip_path, f"/tmp/bots/{bot_name}")

            except Exception as e:
              err = f"Error en export: {e}"
              print(f"[ERROR] {err}")
              resultado["errores"].append(err)
              resultado["estado"] = "RECHAZADO"
              resultados.append(resultado)
              continue

            # ---- ANALIZAR CREDENCIALES ----
            bot_file_path = f"/tmp/bots/{bot_name}"
            if os.path.exists(bot_file_path):
              try:
                with open(bot_file_path, "r", errors="ignore") as f:
                  content = f.read()

                for var in ["password", "passwd", "secret", "api_key", "apikey", "token", "connectionstring"]:
                  import re
                  if re.search(rf'"variableName".*"{var}"', content, re.IGNORECASE):
                    resultado["cred_viol"] += 1
                    resultado["cred_details"].append(f"Variable sensible: {var}")
                    print(f"  [ERROR] Credencial - variable sensible: {var}")

                for pattern in ["jdbc:", "mongodb://", "postgresql://", "mysql://", "password=", "pwd="]:
                  if pattern in content:
                    resultado["cred_viol"] += 1
                    resultado["cred_details"].append(f"Hardcodeado: {pattern}")
                    print(f"  [ERROR] Credencial hardcodeada: {pattern}")

                if resultado["cred_viol"] == 0:
                  print(f"  [OK] Sin credenciales expuestas")

              except Exception as e:
                print(f"  WARN analisis credenciales: {e}")

              # ---- BUENAS PRACTICAS ----
              try:
                with open(bot_file_path, "r", errors="ignore") as f:
                  content = f.read()

                resultado["bp_try"]  = '"commandName":"try"' in content
                resultado["bp_cmts"] = content.count('"commandName":"Comment"')
                resultado["bp_vault"] = '"lockerName"' in content

                print(f"  [BP] try/catch: {resultado['bp_try']} | comentarios: {resultado['bp_cmts']} | vault: {resultado['bp_vault']}")
              except Exception as e:
                print(f"  WARN buenas practicas: {e}")

            # ---- CODE ANALYSIS via API ----
            try:
              payload = json.dumps({"fileId": bot_id, "excludeChildBots": True}).encode("utf-8")

              req = urllib.request.Request(
                aa_url + "/v2/policy/bot/analysis", data=payload, headers=hdrs
              )
              with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                s = json.loads(r.read().decode("utf-8")).get("ruleViolationSummary", {})
                resultado["critical"] = s.get("criticalSeverityCount", 0)
                resultado["high"]     = s.get("highSeverityCount", 0)
                resultado["low"]      = s.get("lowSeverityCount", 0)
                print(f"  [CA] Critical:{resultado['critical']} High:{resultado['high']} Low:{resultado['low']}")

              req = urllib.request.Request(
                aa_url + "/v2/policy/bot/analysis/details", data=payload, headers=hdrs
              )
              with urllib.request.urlopen(req, context=ctx, timeout=60) as r:
                entries = json.loads(r.read().decode("utf-8")).get(
                  "ruleViolationReport", {}
                ).get("ruleViolationEntries", [])
                for entry in entries:
                  var_name = entry.get("variable", {}).get("name", "N/A")
                  for v in entry.get("ruleViolations", []):
                    resultado["issues"].append({
                      "variable": var_name,
                      "rule":     v.get("ruleName", ""),
                      "label":    v.get("ruleLabel", ""),
                      "severity": v.get("ruleSeverity", ""),
                    })
            except Exception as e:
              print(f"  WARN Code Analysis: {e}")

            # ---- ESTADO FINAL DEL BOT ----
            if resultado["critical"] > 0 or resultado["high"] > 0 or resultado["cred_viol"] > 0:
              resultado["estado"] = "RECHAZADO"
            else:
              resultado["estado"] = "APROBADO"

            print(f"  -> Estado: {resultado['estado']}")
            resultados.append(resultado)

          # Guardar resultados
          with open("/tmp/reports/resultados.json", "w") as f:
            json.dump(resultados, f, indent=2)
          print(f"\nResultados guardados: {len(resultados)} bot(s) procesados")

          for r in resultados:
            print(f"  {r['nombre']}: {r['estado']} (Crit:{r['critical']} High:{r['high']} Cred:{r['cred_viol']})")
          PYEOF

      - name: Evaluar gate global y generar reporte HTML
        id: gate
        env:
          BOT_CARPETA: ${{ github.event.inputs.bot_carpeta }}
          RUN_ID:      ${{ github.run_id }}
          REPO:        ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import json, os

          bot_folder = os.environ["BOT_CARPETA"]
          run_id     = os.environ["RUN_ID"]
          repo       = os.environ["REPO"]

          with open("/tmp/reports/resultados.json") as f:
            resultados = json.load(f)

          # Gate global: todos deben pasar
          fallidos   = [r for r in resultados if r["estado"] == "RECHAZADO"]
          aprobados  = [r for r in resultados if r["estado"] == "APROBADO"]
          gate_ok    = len(fallidos) == 0
          total      = len(resultados)

          print(f"Gate global: {'OK' if gate_ok else 'BLOQUEADO'}")
          print(f"  Aprobados: {len(aprobados)}/{total}")
          print(f"  Fallidos:  {len(fallidos)}/{total}")

          # IDs para check-in (todos, solo se usan si gate_ok)
          bot_ids_json = json.dumps([r["id"] for r in resultados])

          # Outputs para GitHub Actions
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"gate_ok={'true' if gate_ok else 'false'}\n")
            f.write(f"bots_count={total}\n")
            f.write(f"bots_fallidos={len(fallidos)}\n")
            f.write(f"bot_ids_json={bot_ids_json}\n")

          # ---- GENERAR REPORTE HTML ----
          gate_color  = "#28a745" if gate_ok else "#dc3545"
          gate_texto  = f"APROBADO - Todos los bots ({total}/{total}) listos para Publica" if gate_ok else \
                        f"RECHAZADO - {len(fallidos)} de {total} bot(s) fallaron el gate"

          # Filas de la tabla resumen
          filas_resumen = ""
          for r in resultados:
            ok    = r["estado"] == "APROBADO"
            color = "#28a745" if ok else "#dc3545"
            icon  = "&#10003;" if ok else "&#10007;"
            cred  = f"&#10003;" if r["cred_viol"] == 0 else f"&#9888; {r['cred_viol']}"
            ca    = "&#10003; Sin violations" if r["critical"] == 0 and r["high"] == 0 \
                    else f"&#10007; {r['critical']} Critical / {r['high']} High"
            bp    = "&#10003;" if r["bp_try"] and r["bp_cmts"] > 0 else "&#9888;"
            filas_resumen += f"""
            <tr>
              <td><strong>{r['nombre']}</strong><br><small style="color:#888">ID: {r['id']}</small></td>
              <td style="text-align:center">{cred}</td>
              <td style="text-align:center">{bp}</td>
              <td style="text-align:center">{ca}</td>
              <td style="text-align:center;color:{color};font-weight:bold">{icon} {r['estado']}</td>
            </tr>"""

          # Detalle por bot (solo los que fallaron o tienen issues)
          detalle_bots = ""
          for r in resultados:
            if r["estado"] == "RECHAZADO" or r["issues"] or r["cred_details"]:
              ok_color  = "#dc3545"
              issues_html = ""

              if r["cred_details"]:
                for d in r["cred_details"]:
                  issues_html += f"<li style='color:#dc3545'>&#10007; Credencial: {d}</li>"

              if not r["bp_try"]:
                issues_html += "<li style='color:#e67e22'>&#9888; Sin bloque try/catch</li>"
              if r["bp_cmts"] == 0:
                issues_html += "<li style='color:#e67e22'>&#9888; Sin comentarios</li>"

              for issue in r["issues"]:
                sev   = issue.get("severity","")
                col   = "#dc3545" if sev == "CRITICAL" else "#ff6600" if sev == "HIGH" else "#ffc107"
                issues_html += f"<li style='color:{col}'>[{sev}] {issue.get('label','')} - Variable: {issue.get('variable','')}</li>"

              if issues_html:
                detalle_bots += f"""
                <div style="margin:15px 0;padding:15px;border-left:4px solid {ok_color};background:#fff8f8;border-radius:4px">
                  <strong>{r['nombre']}</strong> (ID: {r['id']})
                  <ul style="margin-top:8px">{issues_html}</ul>
                </div>"""

          url = f"https://github.com/{repo}/actions/runs/{run_id}"

          html = f"""<!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>Reporte DevSecOps AA - {bot_folder}</title>
            <style>
              body {{ font-family: Arial, sans-serif; margin: 30px; color: #333; }}
              h1 {{ color: #0078d4; }}
              h2 {{ border-bottom: 2px solid #0078d4; padding-bottom: 5px; margin-top: 25px; }}
              table {{ border-collapse: collapse; width: 100%; margin-top: 10px; }}
              th {{ background: #0078d4; color: white; padding: 10px; text-align: left; }}
              td {{ border: 1px solid #ddd; padding: 8px; }}
              tr:nth-child(even) {{ background: #f9f9f9; }}
              .gate {{ padding: 20px; border-radius: 8px; text-align: center;
                       font-size: 16px; font-weight: bold; margin: 20px 0;
                       background: {gate_color}22; border: 2px solid {gate_color}; color: {gate_color}; }}
              .info {{ background: #e7f3ff; border-left: 4px solid #0078d4;
                       padding: 15px; margin: 15px 0; border-radius: 4px; }}
              .btn {{ background: #0078d4; color: white; padding: 12px 24px;
                      text-decoration: none; border-radius: 5px; display: inline-block; }}
            </style>
          </head>
          <body>
            <h1>Reporte DevSecOps - Automation Anywhere</h1>
            <div class="info">
              <strong>Carpeta analizada:</strong> {bot_folder}<br>
              <strong>Bots procesados:</strong> {total}<br>
              <strong>Run ID:</strong> {run_id}
            </div>

            <h2>Estado del Gate DevSecOps</h2>
            <div class="gate">{gate_texto}</div>

            <h2>Resumen por bot</h2>
            <table>
              <tr>
                <th>Bot</th>
                <th style="text-align:center">Credenciales</th>
                <th style="text-align:center">Buenas Practicas</th>
                <th style="text-align:center">Code Analysis</th>
                <th style="text-align:center">Estado</th>
              </tr>
              {filas_resumen}
            </table>

            {'<h2>Detalle de problemas encontrados</h2>' + detalle_bots if detalle_bots else ''}

            <br>
            <a class="btn" href="{url}">Ver detalle en GitHub Actions</a>
            <hr style="margin-top:40px">
            <p style="color:gray;font-size:12px">Generado automaticamente - DevSecOps AA Pipeline</p>
          </body>
          </html>"""

          os.makedirs("/tmp/reports", exist_ok=True)
          with open("/tmp/reports/reporte_final.html", "w") as f:
            f.write(html)
          print("Reporte HTML generado")
          PYEOF

      - name: Subir reportes como artifact
        uses: actions/upload-artifact@v4
        with:
          name: reportes-devsecops
          path: /tmp/reports/
          retention-days: 7

# =================================================================
# JOB 2: NOTIFICAR AL LIDER
# =================================================================
  notificar_lider:
    name: '2. Notificar al lider por correo'
    runs-on: ubuntu-latest
    needs: analizar_bots

    steps:
      - name: Descargar reportes
        uses: actions/download-artifact@v4
        with:
          name: reportes-devsecops
          path: /tmp/reports/

      - name: Enviar correo con tabla resumen
        env:
          MAIL_USERNAME:  ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD:  ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO:        ${{ secrets.MAIL_TO }}
          BOT_CARPETA:    ${{ github.event.inputs.bot_carpeta }}
          GATE_OK:        ${{ needs.analizar_bots.outputs.gate_ok }}
          BOTS_COUNT:     ${{ needs.analizar_bots.outputs.bots_count }}
          BOTS_FALLIDOS:  ${{ needs.analizar_bots.outputs.bots_fallidos }}
          RUN_ID:         ${{ github.run_id }}
          REPO:           ${{ github.repository }}
        run: |
          python3 - << 'PYEOF'
          import smtplib, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          mail_from    = os.environ["MAIL_USERNAME"]
          mail_pass    = os.environ["MAIL_PASSWORD"]
          mail_to_list = [m.strip() for m in os.environ["MAIL_TO"].split(",")]
          carpeta      = os.environ["BOT_CARPETA"]
          gate_ok      = os.environ["GATE_OK"] == "true"
          bots_count   = os.environ["BOTS_COUNT"]
          bots_fallidos= os.environ["BOTS_FALLIDOS"]
          run_id       = os.environ["RUN_ID"]
          repo         = os.environ["REPO"]

          emoji   = "[OK]" if gate_ok else "[ERROR]"
          estado  = "APROBADO" if gate_ok else "RECHAZADO"

          body_html = ""
          if os.path.exists("/tmp/reports/reporte_final.html"):
            with open("/tmp/reports/reporte_final.html", "r") as f:
              body_html = f.read()

          if not body_html:
            url = f"https://github.com/{repo}/actions/runs/{run_id}"
            color = "#28a745" if gate_ok else "#dc3545"
            body_html = f"""
            <html><body style="font-family:Arial,sans-serif;margin:20px">
              <h2 style="color:#0078d4">{emoji} DevSecOps - Carpeta {carpeta}</h2>
              <div style="padding:15px;border-radius:8px;background:{color}22;
                          border:2px solid {color};color:{color};font-weight:bold;text-align:center">
                {estado} - {bots_fallidos} de {bots_count} bots fallaron el gate
              </div>
              <a href="{url}" style="background:#0078d4;color:white;padding:12px 24px;
                 text-decoration:none;border-radius:5px;display:inline-block;margin-top:20px">
                Ver detalle en GitHub Actions
              </a>
            </body></html>"""

          subject = f"[DevSecOps AA] {emoji} Carpeta '{carpeta}' - {estado} ({bots_fallidos} fallidos de {bots_count})"

          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = mail_from
          msg["To"]      = ", ".join(mail_to_list)
          msg.attach(MIMEText(body_html, "html"))

          try:
            with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(mail_from, mail_pass)
              server.sendmail(mail_from, mail_to_list, msg.as_string())
              print(f"Correo enviado a: {mail_to_list}")
          except Exception as e:
            print(f"ERROR enviando correo: {e}")
          PYEOF

# =================================================================
# JOB 3: CHECK-IN A PUBLICA (solo si gate_ok = true)
# =================================================================
  publicar_bots:
    name: '3. Check-in de todos los bots a Publica'
    runs-on: ubuntu-latest
    needs:
      - analizar_bots
      - notificar_lider
    if: ${{ needs.analizar_bots.outputs.gate_ok == 'true' }}

    steps:
      - name: Check-in de todos los bots a Publica
        env:
          AA_URL:           ${{ secrets.AA_URL }}
          AA_USERNAME:      ${{ secrets.AA_USERNAME }}
          AA_API_KEY:       ${{ secrets.AA_API_KEY }}
          AA_AUTH_ENDPOINT: ${{ secrets.AA_AUTH_ENDPOINT }}
          BOT_IDS_JSON:     ${{ needs.analizar_bots.outputs.bot_ids_json }}
        run: |
          python3 - << 'PYEOF'
          import json, urllib.request, ssl, os, sys

          aa_url   = os.environ["AA_URL"]
          username = os.environ["AA_USERNAME"]
          api_key  = os.environ["AA_API_KEY"]
          endpoint = os.environ.get("AA_AUTH_ENDPOINT", "/v2/authentication")
          bot_ids  = json.loads(os.environ["BOT_IDS_JSON"])

          ctx = ssl.create_default_context()

          payload = json.dumps({"username": username, "apiKey": api_key}).encode("utf-8")
          req = urllib.request.Request(
            aa_url + endpoint, data=payload,
            headers={"Content-Type": "application/json"}
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              token = json.loads(r.read().decode("utf-8")).get("token", "")
          except Exception as e:
            print(f"ERROR login: {e}"); sys.exit(1)

          hdrs = {"Content-Type": "application/json", "X-Authorization": token}

          print(f"Haciendo check-in de {len(bot_ids)} bot(s): {bot_ids}")

          # Un solo PUT con todos los IDs
          checkin_payload = json.dumps({
            "ids": [str(i) for i in bot_ids],
            "comment": "Auto check-in DevSecOps pipeline - todos los bots aprobados"
          }).encode("utf-8")

          req = urllib.request.Request(
            aa_url + "/v3/repository/checkin",
            data=checkin_payload,
            headers=hdrs,
            method="PUT"
          )
          try:
            with urllib.request.urlopen(req, context=ctx, timeout=30) as r:
              resp = r.read().decode("utf-8")
              print(f"[OK] Check-in exitoso para {len(bot_ids)} bot(s) -> Publica")
              print(f"     Respuesta: {resp[:300]}")
          except urllib.error.HTTPError as e:
            body_err = e.read().decode("utf-8")
            print(f"ERROR HTTP {e.code}: {body_err[:300]}")
            sys.exit(1)
          except Exception as e:
            print(f"ERROR: {e}"); sys.exit(1)
          PYEOF

# =================================================================
# JOB RESUMEN
# =================================================================
  resumen:
    name: 'Resultado del pipeline'
    runs-on: ubuntu-latest
    needs:
      - analizar_bots
      - notificar_lider
      - publicar_bots
    if: always()
    steps:
      - name: Mostrar resultado
        env:
          GATE_OK:        ${{ needs.analizar_bots.outputs.gate_ok }}
          BOTS_COUNT:     ${{ needs.analizar_bots.outputs.bots_count }}
          BOTS_FALLIDOS:  ${{ needs.analizar_bots.outputs.bots_fallidos }}
          BOT_CARPETA:    ${{ github.event.inputs.bot_carpeta }}
          PUBLICAR_RESULT: ${{ needs.publicar_bots.result }}
        run: |
          echo "============================================"
          echo "  RESULTADO FINAL - DevSecOps AA Pipeline"
          echo "============================================"
          echo "Carpeta:          $BOT_CARPETA"
          echo "Bots procesados:  $BOTS_COUNT"
          echo "Bots fallidos:    $BOTS_FALLIDOS"
          echo "--------------------------------------------"
          if [ "$PUBLICAR_RESULT" = "success" ]; then
            echo "[OK] TODOS LOS BOTS PUBLICADOS EN PUBLICA"
          elif [ "$PUBLICAR_RESULT" = "skipped" ]; then
            echo "[RECHAZADO] NINGÚN BOT PASO A PUBLICA"
            echo "$BOTS_FALLIDOS de $BOTS_COUNT bots fallaron el gate."
            echo "Revisa el correo del lider para el detalle."
          else
            echo "[ERROR] El check-in fallo - revisa los logs"
          fi
          echo "============================================"
